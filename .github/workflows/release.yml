# Release workflow: multi-arch binaries, container image, optional signing and SBOM.
# Trigger: push tag v* (e.g. v0.1.0).
# See MCP_BLUEPRINT.md §8 (Security) and §11 (90-day roadmap).
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p mcp-atlas-core -p mcp-atlas-cli

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: mcp-atlas-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/mcp-atlas
            target/${{ matrix.target }}/release/mcp-atlas-cli

  build-binaries-macos:
    name: Build binaries (macOS)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p mcp-atlas-core -p mcp-atlas-cli

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: mcp-atlas-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/mcp-atlas
            target/${{ matrix.target }}/release/mcp-atlas-cli

  build-container:
    name: Build and push container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.meta.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        id: meta
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-container
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate SBOM
        run: |
          syft packages ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.VERSION }} -o spdx-json=sbom.spdx.json
          syft packages ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.VERSION }} -o cyclonedx-json=sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.version.outputs.VERSION }}
          path: |
            sbom.spdx.json
            sbom.cdx.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-binaries-macos, build-container]
    permissions:
      contents: write
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives per platform
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p release-assets
          for dir in artifacts/mcp-atlas-*; do
            if [ -d "$dir" ]; then
              platform=$(basename "$dir" | sed 's/mcp-atlas-//')
              (cd "$dir" && zip -r "../../release-assets/mcp-atlas-${VERSION}-${platform}.zip" .)
              (cd "$dir" && tar czf "../../release-assets/mcp-atlas-${VERSION}-${platform}.tar.gz" .)
            fi
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

  update-homebrew-formula:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download tarballs and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          for i in 1 2 3 4 5; do
            if curl -sfL -o /tmp/intel.tar.gz "${BASE}/mcp-atlas-${VERSION}-x86_64-apple-darwin.tar.gz" && \
               curl -sfL -o /tmp/arm.tar.gz "${BASE}/mcp-atlas-${VERSION}-aarch64-apple-darwin.tar.gz" && \
               [ -s /tmp/intel.tar.gz ] && [ -s /tmp/arm.tar.gz ]; then
              break
            fi
            echo "Attempt $i/5: release assets not ready, retrying in 10s..."
            sleep 10
          done
          [ -s /tmp/intel.tar.gz ] && [ -s /tmp/arm.tar.gz ] || { echo "Failed to download tarballs"; exit 1; }
          echo "sha_intel=$(shasum -a 256 /tmp/intel.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_arm=$(shasum -a 256 /tmp/arm.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="${{ github.repository }}"
          SHA_INTEL="${{ steps.sha.outputs.sha_intel }}"
          SHA_ARM="${{ steps.sha.outputs.sha_arm }}"
          FORMULA="deploy/homebrew/mcp-atlas.rb"
          sed -i.bak "s|url \"https://github.com/[^\"]*x86_64-apple-darwin.tar.gz\"|url \"https://github.com/${REPO}/releases/download/v${VERSION}/mcp-atlas-${VERSION}-x86_64-apple-darwin.tar.gz\"|" "$FORMULA"
          sed -i.bak "s|url \"https://github.com/[^\"]*aarch64-apple-darwin.tar.gz\"|url \"https://github.com/${REPO}/releases/download/v${VERSION}/mcp-atlas-${VERSION}-aarch64-apple-darwin.tar.gz\"|" "$FORMULA"
          sed -i.bak "s|sha256 \"[^\"]*\"|sha256 \"${SHA_INTEL}\"|" "$FORMULA"
          sed -i.bak "s|sha256 \"[^\"]*\"|sha256 \"${SHA_ARM}\"|2" "$FORMULA"
          rm -f "${FORMULA}.bak"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/homebrew/mcp-atlas.rb
          git diff --staged --quiet || { git commit -m "chore: update Homebrew formula for v${{ steps.version.outputs.VERSION }}"; git push origin ${{ github.event.repository.default_branch }}; }
