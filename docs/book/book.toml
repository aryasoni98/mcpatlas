# mdBook config for CNCF MCP Server (Blueprint §3 Phase 1).
# Build: mdbook build docs/book
# Serve: mdbook serve docs/book

[book]
title = "CNCF MCP Server"
authors = ["CNCF MCP Contributors"]
language = "en"
src = "src"

[build]
build-dir = "build"

[output.html]
default-theme = "light"
no-section-label = false
