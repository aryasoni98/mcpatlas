version: "3.8"

services:
  cncf-mcp:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: cncf-mcp-server
    ports:
      - "3000:3000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - RUST_LOG=info
      - CNCF_MCP_CACHE_DIR=/data/cache
    volumes:
      - cncf-data:/data
    command: ["--transport", "sse", "--port", "3000", "--cache-dir", "/data/cache"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  cncf-data:
    driver: local
