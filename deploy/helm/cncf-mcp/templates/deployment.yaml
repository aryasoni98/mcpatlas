apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cncf-mcp.fullname" . }}
  labels:
    {{- include "cncf-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cncf-mcp.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cncf-mcp.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "cncf-mcp.fullname" . }}-sa
      {{- else if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--transport"
            - {{ .Values.transport | quote }}
            - "--port"
            - "{{ .Values.port }}"
            - "--skip-github"
            - "{{ .Values.skipGithub | quote }}"
            - "--rate-limit"
            - "{{ .Values.rateLimit | quote }}"
            - "--max-cache-age"
            - "{{ .Values.cache.maxAge | quote }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: CNCF_MCP_CACHE_DIR
              value: /app/cache
            - name: RUST_LOG
              value: "info"
            {{- if .Values.github.enabled }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.secretName | default (printf "%s-github" (include "cncf-mcp.fullname" .)) }}
                  key: {{ .Values.github.secretKey | default "token" }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: cache
          emptyDir: {}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
